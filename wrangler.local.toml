name = "gitcdn"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[r2_buckets]]
binding = "CACHE_BUCKET"
bucket_name = "gitcdn-cache"

[limits]
cpu_ms = 300000
subrequests = 1000

[observability]

[observability.logs]
enabled = true
head_sampling_rate = 0.2
invocation_logs = true

[vars]
REFS_TTL = "120"
