name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  unit_test:
    name: Unit Test
    runs-on: ubuntu-latest
    container:
      image: node:22-bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: apt-get update && apt-get install -y --no-install-recommends ca-certificates

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Typecheck
        run: npm exec -- tsc --noEmit

      - name: Run coverage
        run: npm run test:coverage -- --coverage.reporter=text --coverage.reporter=html --coverage.reporter=cobertura

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error

  benchmark:
    name: Benchmark
    needs:
      - unit_test
    runs-on: ubuntu-latest
    container:
      image: node:22-bookworm-slim
    env:
      GITCDN_URL: http://127.0.0.1:8787
      GIT_VERSION: system
      RESULTS_DIR: ci-results/alpine-3.21-system
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends bash ca-certificates coreutils curl git git-lfs tar xz-utils

      - name: Install npm dependencies
        run: npm ci --include=optional

      - name: Prepare scripts
        run: |
          mkdir -p "${RESULTS_DIR}"
          chmod +x ci/install-git.sh
          chmod +x ci/benchmark.sh

      - name: Install Git
        run: |
          ./ci/install-git.sh "${GIT_VERSION}"
          export PATH="/usr/local/bin:${PATH}"
          git --version

      - name: Start local worker
        run: |
          nohup ./node_modules/.bin/wrangler dev -c wrangler.local.toml --ip 127.0.0.1 --port 8787 >"${RESULTS_DIR}/wrangler.log" 2>&1 </dev/null &
          echo $! > "${RESULTS_DIR}/wrangler.pid"
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8787/health > "${RESULTS_DIR}/health.json"; then
              exit 0
            fi
            sleep 1
          done
          cat "${RESULTS_DIR}/wrangler.log"
          exit 1

      - name: Run benchmarks
        run: |
          export PATH="/usr/local/bin:${PATH}"
          ./ci/benchmark.sh

      - name: Stop local worker
        if: always()
        run: |
          if [ -f "${RESULTS_DIR}/wrangler.pid" ]; then
            kill "$(cat "${RESULTS_DIR}/wrangler.pid")" || true
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: ci-results/
          if-no-files-found: error
