name = "gitcdn"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# R2 bucket for cached git data
[[r2_buckets]]
binding = "CACHE_BUCKET"
bucket_name = "gitcdn-cache"

[[migrations]]
tag = "v2"
deleted_classes = ["RepoStatsDO"]

[limits]                                                                                                                                                                        
cpu_ms = 300000
subrequests = 1000 

[observability]

[observability.logs]
enabled = true
head_sampling_rate = 0.2
invocation_logs = true

[vars]
# Comma-separated allowlist of origin hosts. Leave empty to allow all.
# ALLOWED_ORIGINS = "gitlab.gnome.org,codeberg.org,github.com"

# How long to cache /info/refs (seconds). Lower = fresher, higher = less origin load.
# Set to 0 for always-fresh refs (still caches packfiles).
REFS_TTL = "120"

# Optional: protect the proxy with a token
# AUTH_TOKEN = "your-secret-token"

[env.production]
name = "gitcdn"
routes = [
  { pattern = "gitdelivr.net", custom_domain = true },
  { pattern = "www.gitdelivr.net", custom_domain = true }
]

[[env.production.r2_buckets]]
binding = "CACHE_BUCKET"
bucket_name = "gitcdn-cache"

[env.production.vars]
REFS_TTL = "120"
